<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Metadata Extractor</title>
    <script>
      // Instantly suppress early benign environment/HMR websocket rejections or errors
      window.addEventListener('unhandledrejection', function(event) {
        var reason = event.reason;
        if (reason) {
          var msg = typeof reason === 'string' ? reason : (reason.message || '');
          if (msg.indexOf('WebSocket') !== -1 || msg.indexOf('websocket') !== -1 || msg.indexOf('connection') !== -1) {
            event.preventDefault();
            event.stopPropagation();
            event.stopImmediatePropagation();
          }
        }
      }, true);
      window.addEventListener('error', function(event) {
        var msg = event.message || '';
        var errMessage = (event.error && event.error.message) || '';
        if (
          msg.indexOf('WebSocket') !== -1 || 
          msg.indexOf('websocket') !== -1 || 
          msg.indexOf('HMR') !== -1 ||
          errMessage.indexOf('WebSocket') !== -1 || 
          errMessage.indexOf('websocket') !== -1
        ) {
          event.preventDefault();
          event.stopPropagation();
          event.stopImmediatePropagation();
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
